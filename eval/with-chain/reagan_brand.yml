brand: Browser Use
colors:
  background: "#0a0a0a"
  surface: "#111111"
  border: "#1f1f1f"
  foreground: "#ededed"
  muted: "#9a9a9a"
  accent: "#c6f432"  # lime-green, CTAs and active states only
  semantic:
    urgent: "#ff6b6b"
typography:
  sans:
    family: "Geist Sans"
    weights: [400, 500]
  mono:
    family: "Geist Mono"
    weights: [400]
  scale:
    hero: "52px / 1.02 / tracking-tight"
    body: "15px / 1.6"
    label: "11-13px mono for metrics and code"
rules:
  - No gradients
  - No glassmorphism / backdrop blur
  - Accent color used only on CTAs, active step, and underline flourish
  - Borders are 1px solid var(--border); never double-stroke
voice:
  tone: confident, technical, no hype
  avoid: ["revolutionary", "game-changing", "unleash"]
